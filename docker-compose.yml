version: '3.8'

services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474" # interface web Neo4j Browser
      - "7687:7687" # protocole bolt (utilisé par le backend)
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_LOCAL_PASSWORD:-musicgraph123}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:

