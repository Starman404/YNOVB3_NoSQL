version: "3.9"

services:
  neo4j:
    image: neo4j:5.24-community
    container_name: musicgraph-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Interface web Neo4j Browser
      - "7687:7687"   # Bolt protocol (utilisé par le backend)
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: musicgraph-backend
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT}:4000"
    environment:
      PORT: 4000
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      MUSICBRAINZ_BASE_URL: ${MUSICBRAINZ_BASE_URL}
      MUSICBRAINZ_USER_AGENT: ${MUSICBRAINZ_USER_AGENT}
      MUSICBRAINZ_RATE_LIMIT_MS: ${MUSICBRAINZ_RATE_LIMIT_MS}
      CORS_ORIGIN: ${CORS_ORIGIN}
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: musicgraph-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
